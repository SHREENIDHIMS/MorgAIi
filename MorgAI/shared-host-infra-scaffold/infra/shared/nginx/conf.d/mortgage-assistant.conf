# One server block per project. Add a new file here for each additional
# project — do not add more nginx containers.
#
# This proxies to 127.0.0.1:8001, which is owned by a systemd SOCKET
# unit on the host (see infra/systemd/mortgage-backend.socket). The
# app process behind it only starts on the first real connection and
# is stopped again after an idle period by the watcher timer — this
# nginx config doesn't need to know that; it just proxies as normal.

server {
    listen 80;
    server_name mortgage.yourdomain.com;   # replace with real subdomain

    # Static frontend export (Next.js `output: 'export'`)
    root /opt/projects/mortgage-knowledge-assistant/frontend/out;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # First request after idle-stop will be slow (cold start) —
        # give it room instead of timing out.
        proxy_connect_timeout 15s;
        proxy_read_timeout 30s;
    }

    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}
