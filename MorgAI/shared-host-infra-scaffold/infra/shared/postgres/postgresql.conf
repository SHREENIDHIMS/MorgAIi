# Tuned for a shared Postgres instance on a 1 GiB RAM host serving
# multiple lightweight projects. These are deliberately conservative —
# re-tune only after measuring real usage with `free -h` and
# `pg_stat_activity` under load, not in advance.

listen_addresses = 'localhost'     # never expose Postgres beyond the shared_net/localhost

shared_buffers = 32MB              # core cache footprint
max_connections = 15               # keep low — each connection reserves work_mem
work_mem = 2MB                     # prevents large sort/hash allocations per query
maintenance_work_mem = 16MB
effective_cache_size = 128MB       # advisory only, doesn't allocate memory itself

wal_level = minimal
max_wal_senders = 0
fsync = on                         # keep on — don't trade durability for speed here
synchronous_commit = off           # small write-latency win, acceptable for this workload

log_min_duration_statement = 500   # log slow queries only, keep logging light
logging_collector = off            # rely on docker logs instead of file logging overhead
