<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledger — Mortgage Knowledge Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#111217;
  --bg-elevated:#16181e;
  --surface:#1a1c23;
  --surface-2:#20222b;
  --surface-3:#262833;
  --border:#2a2d38;
  --border-soft:#22242d;
  --text:#e9e7e1;
  --text-dim:#a3a5b1;
  --text-faint:#6d6f7c;
  --accent:#7C9CE8;
  --accent-strong:#9AB4F0;
  --accent-soft:rgba(124,156,232,.12);
  --accent-soft-2:rgba(124,156,232,.22);
  --tier-high:#5FA876;
  --tier-high-bg:rgba(95,168,118,.10);
  --tier-medium:#CC9A46;
  --tier-medium-bg:rgba(204,154,70,.10);
  --tier-low:#C8735A;
  --tier-low-bg:rgba(200,115,90,.10);
  --tier-none:#8A8D9B;
  --tier-none-bg:rgba(138,141,155,.10);
  --danger:#D6685E;
  --danger-bg:rgba(214,104,94,.10);
  --font-sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --font-mono:'IBM Plex Mono',ui-monospace,'SF Mono',Menlo,monospace;
  --font-serif:'Source Serif 4',Georgia,serif;
  --r-sm:6px; --r-md:10px; --r-lg:16px; --r-pill:999px;
  --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:24px; --sp-6:32px; --sp-7:48px; --sp-8:64px;
  --shadow-sm:0 1px 2px rgba(0,0,0,.45);
  --shadow-md:0 8px 24px rgba(0,0,0,.4);
  --shadow-lg:0 16px 48px rgba(0,0,0,.5);
  --sidebar-w:236px;
  --ease-settle: cubic-bezier(.22,1.4,.36,1);
}
*,*::before,*::after{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-sans);
  font-size:15px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;color:inherit;}
input,textarea,select{font-family:inherit;color:inherit;}
a{color:inherit;}
::selection{background:var(--accent-soft-2);}
:focus-visible{outline:2px solid var(--accent); outline-offset:2px; border-radius:4px;}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:99px;border:2px solid var(--bg);}
.mono{font-family:var(--font-mono);}
.visually-hidden{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;}

@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important; scroll-behavior:auto !important;}
}

/* ---------- layout ---------- */
.app-shell{display:flex; min-height:100vh;}
.sidebar{
  width:var(--sidebar-w); flex:0 0 auto; background:var(--bg-elevated);
  border-right:1px solid var(--border-soft); display:flex; flex-direction:column;
  position:sticky; top:0; height:100vh;
}
.brand{display:flex; align-items:center; gap:var(--sp-3); padding:var(--sp-5) var(--sp-4) var(--sp-4);}
.brand-mark{width:28px; height:28px; border:1.5px solid var(--accent); border-radius:6px; display:flex; align-items:center; justify-content:center; color:var(--accent); flex:0 0 auto; transform:rotate(-3deg);}
.brand-name{font-weight:600; font-size:1.05rem; letter-spacing:.01em;}
.brand-sub{font-family:var(--font-mono); font-size:.66rem; color:var(--text-faint); letter-spacing:.08em; text-transform:uppercase; margin-top:1px;}
.nav{padding:var(--sp-3) var(--sp-3); display:flex; flex-direction:column; gap:2px; flex:1 1 auto; overflow-y:auto;}
.nav-group-label{font-family:var(--font-mono); font-size:.68rem; letter-spacing:.1em; text-transform:uppercase; color:var(--text-faint); padding:var(--sp-4) var(--sp-3) var(--sp-1);}
.nav-item{
  display:flex; align-items:center; gap:var(--sp-3); padding:9px 12px; border-radius:var(--r-sm);
  background:transparent; border:none; text-align:left; cursor:pointer; color:var(--text-dim);
  font-size:.875rem; font-weight:500; position:relative; transition:background .15s ease, color .15s ease;
}
.nav-item svg{flex:0 0 auto; opacity:.85;}
.nav-item:hover{background:var(--surface-2); color:var(--text);}
.nav-item.active{background:var(--accent-soft); color:var(--accent-strong);}
.nav-item.active::before{content:''; position:absolute; left:-12px; top:6px; bottom:6px; width:3px; border-radius:2px; background:var(--accent);}
.sidebar-footer{border-top:1px solid var(--border-soft); padding:var(--sp-3); display:flex; flex-direction:column; gap:2px;}
.role-chip{display:flex; align-items:center; gap:var(--sp-3); padding:8px 10px; border-radius:var(--r-sm);}
.role-avatar{width:28px; height:28px; border-radius:50%; background:var(--surface-3); display:flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-size:.7rem; font-weight:600; color:var(--accent-strong); flex:0 0 auto;}
.role-meta{min-width:0;}
.role-meta .name{font-size:.82rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.role-meta .role{font-size:.7rem; color:var(--text-faint); font-family:var(--font-mono); text-transform:uppercase; letter-spacing:.04em;}

.main{flex:1 1 auto; min-width:0; display:flex; flex-direction:column;}
.topbar{display:flex; align-items:center; justify-content:space-between; padding:var(--sp-4) var(--sp-6); border-bottom:1px solid var(--border-soft); background:var(--bg);}
.topbar-title{font-size:.95rem; font-weight:600;}
.topbar-crumb{font-family:var(--font-mono); font-size:.68rem; color:var(--text-faint); text-transform:uppercase; letter-spacing:.08em; margin-bottom:2px;}
.view-root{flex:1 1 auto; padding:var(--sp-6); max-width:1180px; width:100%; margin:0 auto;}
.view-root.narrow{max-width:840px;}

/* ---------- buttons / inputs ---------- */
.btn{display:inline-flex; align-items:center; gap:8px; padding:9px 16px; border-radius:var(--r-sm); border:1px solid var(--border); background:var(--surface-2); cursor:pointer; font-size:.85rem; font-weight:600; transition:all .15s ease;}
.btn:hover{background:var(--surface-3); border-color:var(--text-faint);}
.btn-primary{background:var(--accent); border-color:var(--accent); color:#12141a;}
.btn-primary:hover{background:var(--accent-strong); border-color:var(--accent-strong);}
.btn-ghost{background:transparent; border-color:transparent;}
.btn-ghost:hover{background:var(--surface-2);}
.btn-danger{color:var(--danger);}
.btn-sm{padding:6px 11px; font-size:.78rem;}
.btn:disabled{opacity:.45; cursor:not-allowed;}
.icon-btn{display:inline-flex; align-items:center; justify-content:center; width:34px; height:34px; border-radius:50%; border:1px solid transparent; background:transparent; cursor:pointer; color:var(--text-dim); transition:all .15s ease;}
.icon-btn:hover{background:var(--surface-2); color:var(--text);}
.text-input{width:100%; background:var(--surface-2); border:1px solid var(--border); border-radius:var(--r-sm); padding:10px 12px; font-size:.875rem; color:var(--text);}
.text-input:focus{border-color:var(--accent);}
.field-label{display:block; font-size:.78rem; font-weight:600; color:var(--text-dim); margin-bottom:6px;}
.field{margin-bottom:var(--sp-4);}
.select-input{width:100%; background:var(--surface-2); border:1px solid var(--border); border-radius:var(--r-sm); padding:10px 12px; font-size:.875rem;}

/* ---------- switch ---------- */
.switch{position:relative; width:38px; height:22px; border-radius:99px; background:var(--surface-3); border:1px solid var(--border); cursor:pointer; flex:0 0 auto; transition:background .15s ease;}
.switch::after{content:''; position:absolute; width:16px; height:16px; border-radius:50%; background:var(--text-faint); top:2px; left:2px; transition:transform .18s var(--ease-settle), background .15s ease;}
.switch.on{background:var(--accent-soft-2); border-color:var(--accent);}
.switch.on::after{transform:translateX(16px); background:var(--accent);}

/* ---------- badges ---------- */
.badge{display:inline-flex; align-items:center; gap:5px; font-family:var(--font-mono); font-size:.68rem; letter-spacing:.04em; text-transform:uppercase; padding:3px 8px; border-radius:5px; font-weight:600; border:1px solid transparent;}
.badge-dot{width:6px; height:6px; border-radius:50%; flex:0 0 auto;}
.badge-active{color:var(--tier-high); background:var(--tier-high-bg); border-color:rgba(95,168,118,.3);}
.badge-active .badge-dot{background:var(--tier-high);}
.badge-pending{color:var(--tier-medium); background:var(--tier-medium-bg); border-color:rgba(204,154,70,.3);}
.badge-pending .badge-dot{background:var(--tier-medium);}
.badge-failed{color:var(--danger); background:var(--danger-bg); border-color:rgba(214,104,94,.3);}
.badge-failed .badge-dot{background:var(--danger);}
.badge-neutral{color:var(--text-dim); background:var(--surface-3); border-color:var(--border);}
.badge-neutral .badge-dot{background:var(--text-faint);}

/* ---------- login ---------- */
.login-shell{min-height:100vh; display:flex; align-items:center; justify-content:center; background:
  radial-gradient(ellipse 900px 500px at 50% -10%, rgba(124,156,232,.10), transparent 60%), var(--bg);}
.login-card{width:100%; max-width:380px; padding:var(--sp-6); }
.login-brand{display:flex; flex-direction:column; align-items:center; margin-bottom:var(--sp-6); text-align:center;}
.login-brand .brand-mark{width:44px; height:44px; border-radius:10px; margin-bottom:var(--sp-4);}
.login-brand h1{font-size:1.3rem; margin:0 0 4px;}
.login-brand p{margin:0; color:var(--text-faint); font-size:.82rem;}
.login-error{display:flex; gap:8px; align-items:flex-start; background:var(--danger-bg); border:1px solid rgba(214,104,94,.3); color:var(--danger); padding:10px 12px; border-radius:var(--r-sm); font-size:.8rem; margin-bottom:var(--sp-4);}
.role-picker{display:flex; flex-direction:column; gap:8px; margin-bottom:var(--sp-5);}
.role-option{display:flex; align-items:center; justify-content:space-between; padding:11px 14px; border-radius:var(--r-md); border:1px solid var(--border); background:var(--surface-2); cursor:pointer; transition:all .15s ease;}
.role-option:hover{border-color:var(--accent);}
.role-option.selected{border-color:var(--accent); background:var(--accent-soft);}
.role-option .rname{font-size:.85rem; font-weight:600;}
.role-option .rdesc{font-size:.72rem; color:var(--text-faint); margin-top:1px;}

/* ---------- search hero ---------- */
.search-hero{text-align:center; padding:var(--sp-7) 0 var(--sp-5);}
.search-hero h1{font-size:1.65rem; margin:0 0 8px; font-weight:600; letter-spacing:-.01em;}
.search-hero p{margin:0; color:var(--text-faint); font-size:.9rem;}
.search-bar-wrap{position:sticky; top:0; z-index:5; padding-bottom:var(--sp-5); background:linear-gradient(var(--bg) 70%, transparent);}
.search-bar{display:flex; align-items:center; gap:10px; background:var(--surface-2); border:1px solid var(--border); border-radius:var(--r-pill); padding:6px 8px 6px 20px; box-shadow:var(--shadow-sm); transition:border-color .15s ease, box-shadow .15s ease;}
.search-bar:focus-within{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft);}
.search-bar input{flex:1 1 auto; background:transparent; border:none; outline:none; font-size:.92rem; color:var(--text); min-width:0;}
.search-bar input::placeholder{color:var(--text-faint);}
.search-submit{width:38px; height:38px; border-radius:50%; background:var(--accent); border:none; color:#12141a; display:flex; align-items:center; justify-content:center; cursor:pointer; flex:0 0 auto;}
.search-submit:disabled{background:var(--surface-3); color:var(--text-faint); cursor:default;}

/* ---------- mic button ---------- */
.mic-btn{position:relative; width:38px; height:38px; border-radius:50%; border:1px solid var(--border); background:var(--surface-3); color:var(--text-dim); display:flex; align-items:center; justify-content:center; cursor:pointer; flex:0 0 auto; overflow:visible; transition:all .15s ease;}
.mic-btn:hover{color:var(--text);}
.mic-btn.listening{background:var(--accent); border-color:var(--accent); color:#12141a;}
.mic-btn.denied{color:var(--danger);}
.mic-ring{position:absolute; inset:-4px; border-radius:50%; border:1.5px solid var(--accent); opacity:0; pointer-events:none;}
.mic-btn.listening .mic-ring{animation:mic-pulse 1.6s ease-out infinite;}
.mic-ring.r2{animation-delay:.5s !important;}
@keyframes mic-pulse{0%{transform:scale(.85); opacity:.65;} 100%{transform:scale(1.9); opacity:0;}}
.waveform{display:flex; align-items:center; gap:2px; height:16px;}
.waveform span{width:2.5px; border-radius:2px; background:#12141a; display:block; animation:wave-bounce .8s ease-in-out infinite; transform-origin:center;}
.waveform span:nth-child(1){animation-delay:0s;}
.waveform span:nth-child(2){animation-delay:.12s;}
.waveform span:nth-child(3){animation-delay:.24s;}
.waveform span:nth-child(4){animation-delay:.36s;}
@keyframes wave-bounce{0%,100%{transform:scaleY(.45);} 50%{transform:scaleY(1);}}

.voice-status-row{display:flex; align-items:center; justify-content:center; gap:8px; padding-top:10px; font-family:var(--font-mono); font-size:.72rem; color:var(--text-faint); text-transform:uppercase; letter-spacing:.06em; min-height:20px;}
.voice-status-row.live{color:var(--accent-strong);}
.voice-status-row .cancel-link{text-transform:none; letter-spacing:0; font-family:var(--font-sans); color:var(--text-dim); text-decoration:underline; cursor:pointer; background:none; border:none; font-size:.75rem;}

/* ---------- example chips ---------- */
.chip-grid{display:flex; flex-wrap:wrap; gap:8px; justify-content:center; padding:0 var(--sp-4);}
.chip{padding:8px 14px; border-radius:var(--r-pill); border:1px solid var(--border); background:var(--surface-2); font-size:.8rem; color:var(--text-dim); cursor:pointer; transition:all .15s ease;}
.chip:hover{border-color:var(--accent); color:var(--text);}

/* ---------- scan loader (search / processing — never a spinner) ---------- */
.scan-loader{margin-top:var(--sp-5); display:flex; flex-direction:column; align-items:center; gap:14px;}
.retrieval-pill{display:inline-flex; align-items:center; gap:9px; background:var(--surface-2); border:1px solid var(--border); padding:8px 16px; border-radius:var(--r-pill); box-shadow:var(--shadow-sm);}
.retrieval-pill .spark{color:var(--accent-strong); display:flex; animation:spark-spin 1.1s linear infinite;}
@keyframes spark-spin{from{transform:rotate(0deg);} to{transform:rotate(360deg);}}
.retrieval-pill .phrase{font-size:.82rem; color:var(--text-dim); font-weight:500; animation:phrase-fade .5s ease;}
@keyframes phrase-fade{from{opacity:0; transform:translateY(3px);} to{opacity:1; transform:none;}}
.scan-track{height:2px; width:220px; background:var(--border-soft); border-radius:2px; overflow:hidden; position:relative;}
.scan-track::after{content:''; position:absolute; top:0; left:-30%; width:30%; height:100%; background:linear-gradient(90deg, transparent, var(--accent), transparent); animation:scan-move 1.1s ease-in-out infinite;}
@keyframes scan-move{0%{left:-30%;} 100%{left:100%;}}

/* ---------- compact action toolbar (copy / listen / feedback / retry) ---------- */
.action-toolbar{display:flex; align-items:center; gap:2px;}
.action-toolbar .icon-btn.active-up{color:var(--tier-high); background:var(--tier-high-bg);}
.action-toolbar .icon-btn.active-down{color:var(--danger); background:var(--danger-bg);}
.action-toolbar .icon-btn.active-speak{color:var(--accent-strong); background:var(--accent-soft);}
.action-toolbar .icon-btn.active-speak svg{animation:speak-pulse 1s ease-in-out infinite;}
@keyframes speak-pulse{0%,100%{opacity:1;} 50%{opacity:.55;}}

/* ---------- response card ---------- */
.result-block{margin-top:var(--sp-5); display:flex; flex-direction:column; gap:var(--sp-4);}
.rcard{background:var(--surface); border:1px solid var(--border); border-radius:var(--r-lg); padding:var(--sp-5); animation:card-in .32s var(--ease-settle);}
@keyframes card-in{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;}}
.rcard-head{display:flex; align-items:flex-start; justify-content:space-between; gap:var(--sp-4); margin-bottom:var(--sp-4);}
.rcard-title{font-size:1.08rem; font-weight:600; margin:0 0 4px;}
.rcard-eyebrow{font-family:var(--font-mono); font-size:.68rem; color:var(--text-faint); text-transform:uppercase; letter-spacing:.08em;}

/* stamp — signature element */
.stamp{
  font-family:var(--font-mono); font-weight:700; font-size:.72rem; letter-spacing:.06em; text-transform:uppercase;
  padding:7px 13px; border-radius:5px; border:2px solid var(--tier-c); color:var(--tier-c); background:var(--tier-bg);
  display:inline-flex; align-items:center; gap:8px; transform:rotate(-2deg); position:relative; white-space:nowrap;
  box-shadow: inset 0 0 0 2px var(--tier-bg); flex:0 0 auto;
  animation:stamp-press .38s var(--ease-settle);
}
.stamp::before{content:''; width:6px; height:6px; border-radius:50%; background:var(--tier-c); flex:0 0 auto;}
@keyframes stamp-press{0%{opacity:0; transform:scale(1.5) rotate(-9deg);} 60%{opacity:1;} 100%{opacity:1; transform:scale(1) rotate(-2deg);}}
.stamp-score{opacity:.75; font-weight:600;}
.stamp-btn{border:none; background:none; cursor:pointer; padding:0; margin:0;}

.confidence-explain{margin-top:10px; padding:12px 14px; background:var(--surface-2); border:1px solid var(--border-soft); border-radius:var(--r-sm); font-size:.78rem; color:var(--text-dim); animation:card-in .2s ease;}
.confidence-explain ul{margin:6px 0 0; padding-left:18px;}
.confidence-explain li{margin-bottom:3px;}

.excerpt{
  font-family:var(--font-serif); font-size:1.02rem; line-height:1.65; color:var(--text);
  border-left:2px solid var(--border); padding:2px 0 2px 18px; margin:0 0 var(--sp-4); font-style:italic;
}
.rcard.tier-low .excerpt{color:var(--text-dim);}

.rcard-section{margin-bottom:var(--sp-4);}
.rcard-section-title{font-family:var(--font-mono); font-size:.7rem; text-transform:uppercase; letter-spacing:.07em; color:var(--text-faint); margin:0 0 8px;}
.doc-checklist{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:6px;}
.doc-checklist li{display:flex; align-items:flex-start; gap:9px; font-size:.85rem; color:var(--text-dim);}
.doc-checklist svg{margin-top:2px; flex:0 0 auto; color:var(--text-faint);}
.steps-list{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:8px; counter-reset:step;}
.steps-list li{display:flex; gap:10px; font-size:.85rem; color:var(--text-dim); counter-increment:step;}
.steps-list li::before{content:counter(step); font-family:var(--font-mono); font-size:.72rem; font-weight:700; color:var(--accent-strong); background:var(--accent-soft); width:19px; height:19px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex:0 0 auto; margin-top:1px;}

.citation{display:inline-flex; align-items:center; gap:7px; font-family:var(--font-mono); font-size:.76rem; color:var(--accent-strong); background:var(--accent-soft); padding:7px 11px; border-radius:var(--r-sm); border:1px solid transparent; cursor:pointer; transition:all .15s ease;}
.citation:hover{border-color:var(--accent);}

.related-row{display:flex; flex-wrap:wrap; gap:7px;}
.related-chip{font-size:.78rem; color:var(--text-faint); background:transparent; border:1px solid var(--border-soft); padding:6px 11px; border-radius:var(--r-pill); cursor:pointer; transition:all .15s ease;}
.related-chip:hover{color:var(--text); border-color:var(--text-faint);}

.rcard-footer{display:flex; align-items:center; justify-content:space-between; padding-top:var(--sp-4); margin-top:var(--sp-1); border-top:1px solid var(--border-soft);}
.feedback-row{display:flex; align-items:center; gap:4px;}
.fb-btn{width:32px; height:32px; border-radius:50%; border:1px solid transparent; background:none; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text-faint); transition:all .15s ease;}
.fb-btn:hover{background:var(--surface-2); color:var(--text);}
.fb-btn.active-up{color:var(--tier-high); background:var(--tier-high-bg);}
.fb-btn.active-down{color:var(--danger); background:var(--danger-bg);}
.fb-ack{font-size:.75rem; color:var(--text-faint); margin-left:6px; animation:fade-in-out 2.4s ease forwards;}
@keyframes fade-in-out{0%{opacity:0;} 15%{opacity:1;} 80%{opacity:1;} 100%{opacity:0;}}
.fb-reason-row{display:flex; flex-wrap:wrap; gap:6px; margin-top:10px;}
.fb-reason-chip{font-size:.72rem; padding:5px 10px; border-radius:var(--r-pill); border:1px solid var(--border); background:var(--surface-2); cursor:pointer; color:var(--text-dim);}
.fb-reason-chip:hover{border-color:var(--text-faint); color:var(--text);}

.listen-btn{display:inline-flex; align-items:center; gap:8px; font-size:.8rem; font-weight:600; color:var(--text-dim); background:var(--surface-2); border:1px solid var(--border); padding:7px 13px; border-radius:var(--r-pill); cursor:pointer; transition:all .15s ease;}
.listen-btn:hover{border-color:var(--accent);}
.listen-btn.playing{color:var(--accent-strong); border-color:var(--accent); background:var(--accent-soft);}
.listen-progress{width:52px; height:3px; background:var(--border); border-radius:2px; overflow:hidden;}

function fmtDate(iso){

function tierMeta(tier){
  return {
    high:{label:'Verified', c:'var(--tier-high)', bg:'var(--tier-high-bg)'},
    medium:{label:'Verify source', c:'var(--tier-medium)', bg:'var(--tier-medium-bg)'},
    low:{label:'Low confidence', c:'var(--tier-low)', bg:'var(--tier-low-bg)'},
    none:{label:'No confident match', c:'var(--tier-none)', bg:'var(--tier-none-bg)'},
  }[tier];
}
function toast(msg){
  const id = 't'+Date.now()+Math.random();
  state.toasts.push({id, msg});
  update();
  setTimeout(()=>{ state.toasts = state.toasts.filter(t=>t.id!==id); update(); }, 2600);
}
function showAck(id, text){
  state.ackFor = {id, text};
  update();
  setTimeout(()=>{ if(state.ackFor && state.ackFor.id===id && state.ackFor.text===text){ state.ackFor=null; update(); } }, 2200);
}
function withFocusPreserved(fn){
  const active = document.activeElement;
  const id = active && active.id;
  const tag = active && active.tagName;
  const canSelect = tag === 'INPUT' || tag === 'TEXTAREA';
  const selStart = canSelect ? active.selectionStart : null;
  const selEnd = canSelect ? active.selectionEnd : null;
  const scrollY = window.scrollY;
  fn();
  if(id){
    const revived = document.getElementById(id);
    if(revived){
      revived.focus({preventScroll:true});
      if(canSelect && selStart!=null){
        try{ revived.setSelectionRange(selStart, selEnd); }catch(e){}
      }
    }
  }
  window.scrollTo(0, scrollY);
}
function update(){ withFocusPreserved(fullRender); }

function renderVoiceStatusRow(){

    low_confidence:"Didn't quite catch that clearly — please check the text before searching",

    error:'Voice input had a problem — please type your question',

  if(!map[v.status]) return `<div class="voice-status-row"></div>`;
  const live = v.status==='listening' || v.status==='processing' || v.status==='permission';

/* ---------------- DOCUMENT LIBRARY ---------------- */
function statusBadge(status){
  const map = {
    active:{cls:'badge-active', label:'Active'},
    pending_processing:{cls:'badge-pending', label:'Pending processing'},
    processing:{cls:'badge-pending', label:'Processing'},
    pending_approval:{cls:'badge-pending', label:'Pending approval'},
    failed:{cls:'badge-failed', label:'Failed'},
  }[status] || {cls:'badge-neutral', label:status};
  return `<span class="badge ${map.cls}"><span class="badge-dot"></span>${map.label}</span>`;
}

function renderUploadFileRow(f,i){
  if(f.rejected){
    return `<div class="file-row" style="border-color:rgba(214,104,94,.35)">
      <div style="flex:1 1 auto;">
        <div class="fname">${f.name}</div>
        <div class="reject-msg">${icon('alert')} ${f.rejectReason}</div>
      </div>
      <button class="icon-btn" data-action="remove-upload-row" data-i="${i}">${icon('x')}</button>
    </div>`;
  }
  const needsMeta = f.stage==='meta';
  return `<div class="file-row" style="align-items:flex-start;">
    <div style="flex:1 1 auto;">
      <div class="fname">${f.name}</div>
      <div class="fmeta">${f.size} · ${stageLabel(f.stage)}</div>
      ${f.stage==='uploading' ? `<div class="file-progress"><div style="width:${f.progress}%"></div></div>` : ''}
      ${needsMeta ? `
        <div style="margin-top:12px; display:grid; grid-template-columns:1fr 1fr; gap:8px;">
          <select class="select-input" data-action="meta-dept" data-i="${i}">
            <option ${f.dept==='FHA'?'selected':''}>FHA</option><option ${f.dept==='Conventional'?'selected':''}>Conventional</option>
            <option ${f.dept==='VA'?'selected':''}>VA</option><option ${f.dept==='Underwriting'?'selected':''}>Underwriting</option>
            <option ${f.dept==='Compliance'?'selected':''}>Compliance</option><option ${f.dept==='Servicing'?'selected':''}>Servicing</option>
          </select>
          <input class="text-input" placeholder="Version, e.g. 2026.1" data-action="meta-version" data-i="${i}" value="${f.version||''}">
        </div>
        <label style="display:flex; align-items:center; gap:8px; margin-top:10px; font-size:.78rem; color:var(--text-dim);">
          <div class="switch ${f.requiresApproval?'on':''}" data-action="meta-approval" data-i="${i}"></div>
          Requires compliance approval before going active
        </label>
        <button class="btn btn-primary btn-sm" style="margin-top:10px;" data-action="confirm-upload" data-i="${i}">Start upload</button>
      ` : ''}
    </div>
    ${!needsMeta ? statusBadge(f.stage==='done'?'active':(f.stage==='processing'?'processing':(f.stage==='pending'?'pending_processing':f.stage))) : ''}
  </div>`;
}
function stageLabel(stage){
  return {meta:'Add metadata to begin upload', uploading:'Uploading…', pending:'Pending processing', processing:'Ingestion running (OCR, chunking, embedding)', done:'Active — searchable'}[stage] || stage;
}

/* ---------------- KNOWLEDGE GAP REVIEW ---------------- */
function renderGapsView(){
  const gf = state.gapFilter;
  let rows = state.gaps.filter(g => (gf.showResolved || !g.resolved) && (gf.dept==='all' || g.dept===gf.dept));
  rows.sort((a,b)=> gf.sort==='freq' ? b.freq-a.freq : new Date(b.ts)-new Date(a.ts));
  const depts = [...new Set(state.gaps.map(g=>g.dept))];
  const empty = state.gapsEmptyDemo || rows.length===0;
  return `
    <div class="page-head">
      <h1>Knowledge Gap Review</h1>
      <p>Queries that returned no confident match — a signal for what's missing or poorly indexed.</p>
    </div>
    <div class="panel">
      <div class="filter-bar">
        <select data-action="gap-filter-sort">
          <option value="freq" ${gf.sort==='freq'?'selected':''}>Sort: Frequency</option>
          <option value="recent" ${gf.sort==='recent'?'selected':''}>Sort: Most recent</option>
        </select>
        <select data-action="gap-filter-dept">
          <option value="all">All departments</option>
          ${depts.map(d=>`<option value="${d}" ${gf.dept===d?'selected':''}>${d}</option>`).join('')}
        </select>
        <label style="display:flex;align-items:center;gap:7px;font-size:.78rem;color:var(--text-dim);">
          <input type="checkbox" data-action="gap-filter-resolved" ${gf.showResolved?'checked':''}> Show resolved
        </label>
      </div>
      ${empty ? `
        <div class="empty-row">
          <div class="big-icon">${icon('checkCircle')}</div>
          <div style="color:var(--text); font-weight:600; margin-bottom:4px;">No open knowledge gaps</div>
          <div style="font-size:.82rem;">Every recent query returned a confident, sourced result. Nothing needs attention right now.</div>
        </div>
      ` : `
        <table class="data-table">
          <thead><tr><th>Query</th><th>Dept.</th><th>Role</th><th>Frequency</th><th>Last seen</th><th>Status</th><th></th></tr></thead>
          <tbody>
            ${rows.map(g=>`
              <tr>
                <td style="color:var(--text); max-width:340px;">${g.query}</td>
                <td>${g.dept}</td>
                <td class="mono-cell">${ROLES[g.role].short}</td>

              </tr>`).join('')}
          </tbody>
        </table>
      `}
    </div>
  `;
}

/* ---------------- SEARCH logic ---------------- */
const PACKAGES_BY_TIER = { high:PACKAGES.fha_credit, medium:PACKAGES.pmi_removal, low:PACKAGES.self_employed };

function matchPackage(query){
  const q = query.toLowerCase();
  if(q.includes('fha') || q.includes('credit score')) return PACKAGES.fha_credit;
  if(q.includes('pmi') || q.includes('ltv')) return PACKAGES.pmi_removal;
  if(q.includes('self-employ') || q.includes('self employ') || q.includes('1099') || q.includes('income document')) return PACKAGES.self_employed;
  return null;
}

function otherMatchesFor(pkg){
  return Object.values(PACKAGES).filter(p=>p.id!==pkg.id).slice(0,2).map(p=>({id:p.id, title:p.title, excerpt:p.excerpt.slice(0,90)+'…'}));
}

function logGap(query){
  const exists = state.gaps.find(g=>g.query.toLowerCase()===query.toLowerCase());
  if(exists){ exists.freq += 1; exists.ts = new Date().toISOString(); return; }
  state.gaps.unshift({id:'g'+Date.now(), query, ts:new Date().toISOString(), freq:1, role:state.role, dept: state.role==='underwriter'?'Underwriting':'Retail Lending', resolved:false});
}
function logAudit(query, pkg){
  state.audit.unshift({id:'a'+Date.now(), user:state.userName, role:state.role, query, ts:new Date().toISOString(), confidence:pkg.score, tier:pkg.tier, docs:[pkg.source.doc], rid:'RSP-'+Math.floor(80000+Math.random()*9000)});
}

function runSearch(query){
  query = (query||'').trim();
  if(!query) return;
  state.lastQuery = query;
  state.results = null;
  state.loading = true;
  state.loadingPhraseIndex = 0;
  state.expandedConfidence = null;
  update();
  if(loadingPhraseTimer) clearInterval(loadingPhraseTimer);
  loadingPhraseTimer = setInterval(()=>{
    state.loadingPhraseIndex = (state.loadingPhraseIndex + 1) % RETRIEVAL_PHRASES.length;
    update();
  }, 850);
  setTimeout(()=>{
    clearInterval(loadingPhraseTimer);
    loadingPhraseTimer = null;
    state.loading = false;
    const forced = state.demoForce;
    if(forced === 'error'){ state.results = {mode:'error', query}; update(); return; }
    if(forced === 'none'){ state.results = {mode:'no_match', query}; logGap(query); update(); return; }
    let pkg = (forced && PACKAGES_BY_TIER[forced]) ? PACKAGES_BY_TIER[forced] : matchPackage(query);
    if(!pkg){
      state.results = {mode:'no_match', query};
      logGap(query);
    } else {
      state.results = {mode:'result', pkg, others: otherMatchesFor(pkg)};
      logAudit(query, pkg);
    }
    update();
  }, 700);
}

/* ---------------- VOICE INPUT ---------------- */
function ensureRecognition(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) return null;
  if(recognition) return recognition;
  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.lang = 'en-US';
  recognition.onresult = (e)=>{
    let interim = '', final = '';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    const input = document.getElementById('search-input');
    if(input) input.value = final || interim;
    if(final){
      state.voice.status = 'processing';
      update();
      setTimeout(()=>{
        state.voice.status = 'idle';
        state.lastQuery = final.trim();
        update();
        const inp = document.getElementById('search-input');
        if(inp){ inp.value = final.trim(); inp.focus(); }
      }, 450);
    }
  };
  recognition.onerror = (e)=>{
    if(e.error === 'no-speech') state.voice.status = 'no_speech';
    else if(e.error === 'not-allowed' || e.error === 'service-not-allowed') state.voice.status = 'denied';
    else state.voice.status = 'error';
    update();
  };
  recognition.onend = ()=>{
    if(state.voice.status === 'listening'){ state.voice.status = 'idle'; update(); }
  };
  return recognition;
}

function micToggle(){
  const v = state.voice;
  if(v.pushToTalk) return; // handled by press-and-hold instead
  if(v.status === 'listening'){ stopListening(); return; }
  if(v.status === 'permission' || v.status === 'processing') return;
  startListening();
}

function startListening(){
  state.voice.status = 'permission';
  update();
  setTimeout(()=>{
    const forcedVoice = state.voiceDemoForce;
    if(forcedVoice === 'denied'){
      state.voice.status = 'denied'; update();
      setTimeout(()=>{ if(state.voice.status==='denied'){ state.voice.status='idle'; update(); } }, 2400);
      return;
    }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(SR && !forcedVoice){
      try{
        const rec = ensureRecognition();
        state.voice.status = 'listening';
        update();
        rec.start();
        return;
      }catch(e){ /* fall back to simulated flow below */ }
    }
    runSimulatedVoice(forcedVoice);
  }, 480);
}

function stopListening(){
  if(recognition){ try{ recognition.stop(); }catch(e){} }
  if(listenTimeout) clearTimeout(listenTimeout);
  state.voice.status = 'idle';
  update();
}

function runSimulatedVoice(forced){
  state.voice.status = 'listening';
  update();
  if(forced === 'no_speech'){
    listenTimeout = setTimeout(()=>{
      state.voice.status = 'no_speech'; update();
      setTimeout(()=>{ if(state.voice.status==='no_speech'){ state.voice.status='idle'; update(); } }, 2200);
    }, 1700);
    return;
  }
  const demoLines = [
    'What documents are needed for a VA loan appraisal',
    'Can PMI be removed before seventy eight percent LTV',
    'Minimum credit score for an FHA loan',
  ];
  const line = demoLines[Math.floor(Math.random()*demoLines.length)];
  const words = line.split(' ');
  let wi = 0, partial = '';
  const iv = setInterval(()=>{
    partial += (wi ? ' ' : '') + words[wi]; wi++;
    const input = document.getElementById('search-input');
    if(input) input.value = partial;
    if(wi >= words.length){
      clearInterval(iv);
      listenTimeout = setTimeout(()=>{
        state.voice.status = 'processing'; update();
        setTimeout(()=>{
          state.voice.status = (forced === 'low_confidence') ? 'low_confidence' : 'idle';
          state.lastQuery = line;
          update();
          const inp = document.getElementById('search-input');
          if(inp){ inp.value = line; inp.focus(); }
          if(forced === 'low_confidence'){
            setTimeout(()=>{ if(state.voice.status==='low_confidence'){ state.voice.status='idle'; update(); } }, 2600);
          }
        }, 480);
      }, 280);
    }
  }, 150);
}

/* ---------------- VOICE OUTPUT (real speechSynthesis) ---------------- */
function startTTS(pkg){
  if(!('speechSynthesis' in window)){ toast("This browser doesn't support text-to-speech."); return; }
  window.speechSynthesis.cancel();
  state.tts.activeId = pkg.id;
  state.tts.status = 'buffering';
  state.tts.progress = 0;
  update();
  setTimeout(()=>{
    let text = pkg.excerpt + ` According to ${pkg.source.doc}, ${pkg.source.section}.`;
    if(state.tts.readStepsToo){
      text += ' Required documents: ' + pkg.docsNeeded.join(', ') + '. Next steps: ' + pkg.steps.join('. ') + '.';
    }
    const utter = new SpeechSynthesisUtterance(text);
    utter.rate = 0.98;
    utter.onboundary = (e)=>{ state.tts.progress = Math.min(100, Math.round((e.charIndex/text.length)*100)); update(); };
    utter.onend = ()=>{ state.tts.status='idle'; state.tts.activeId=null; state.tts.progress=0; update(); };
    utter.onerror = ()=>{ toast('Voice playback hit an error.'); state.tts.status='idle'; state.tts.activeId=null; update(); };
    state.tts.status = 'playing';
    update();
    window.speechSynthesis.speak(utter);
  }, 320);
}
function pauseResumeTTS(){
  if(!('speechSynthesis' in window)) return;
  if(state.tts.status === 'playing'){ window.speechSynthesis.pause(); state.tts.status = 'paused'; update(); }
  else if(state.tts.status === 'paused'){ window.speechSynthesis.resume(); state.tts.status = 'playing'; update(); }
}
function stopTTS(){
  if('speechSynthesis' in window) window.speechSynthesis.cancel();
  state.tts.status = 'idle'; state.tts.activeId = null; state.tts.progress = 0; update();
}

/* ---------------- FEEDBACK ---------------- */
function handleFeedback(id, vote){
  const current = state.feedback[id];
  if(current === vote){ delete state.feedback[id]; state.feedbackReasonOpenFor=null; update(); return; }
  state.feedback[id] = vote;
  if(vote === 'down'){
    state.feedbackReasonOpenFor = id;
    update();
  } else {
    state.feedbackReasonOpenFor = null;
    showAck(id, 'Thanks — recorded');
  }
}

function copyExcerpt(pkg){
  const text = pkg.excerpt + ' — ' + pkg.source.doc + ', ' + pkg.source.section + '.';
  const onDone = ()=> showAck(pkg.id, 'Copied');
  const onFail = ()=> toast("Couldn't copy — please select the text manually.");
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(onDone).catch(()=>fallbackCopy(text, onDone, onFail));
  } else {
    fallbackCopy(text, onDone, onFail);
  }
}
function fallbackCopy(text, onDone, onFail){
  try{
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    ok ? onDone() : onFail();
  }catch(e){ onFail(); }
}

/* ---------------- UPLOAD ---------------- */
function humanSize(bytes){
  if(bytes < 1024*1024) return Math.round(bytes/1024)+' KB';
  return (bytes/(1024*1024)).toFixed(1)+' MB';
}
function handleFilesSelected(fileList){
  const valid = ['pdf','docx','pptx','xlsx'];
  Array.from(fileList).forEach(file=>{
    const ext = file.name.split('.').pop().toLowerCase();
    if(!valid.includes(ext)){
      state.uploadFiles.push({name:file.name, rejected:true, rejectReason:`.${ext} isn't a supported file type. Use PDF, DOCX, PPTX or XLSX.`});
      return;
    }
    if(file.size > 50*1024*1024){
      state.uploadFiles.push({name:file.name, rejected:true, rejectReason:'File exceeds the 50MB limit.'});
      return;
    }
    state.uploadFiles.push({name:file.name, size:humanSize(file.size), stage:'meta', dept:'FHA', version:'', requiresApproval:true});
  });
  update();
}
function confirmUpload(i){
  const f = state.uploadFiles[i];
  if(!f) return;
  f.stage = 'uploading'; f.progress = 0;
  update();
  const iv = setInterval(()=>{
    f.progress += 16 + Math.random()*12;
    if(f.progress >= 100){
      f.progress = 100; clearInterval(iv);
      f.stage = 'pending';
      update();
      setTimeout(()=>{
        f.stage = 'processing'; update();
        setTimeout(()=>{
          f.stage = f.requiresApproval ? 'pending_approval' : 'done';
          update();
          if(f.stage === 'done') addFileToLibrary(f);
        }, 2400);
      }, 900);
    } else { update(); }
  }, 260);
}
function addFileToLibrary(f){
  if(f.addedToLibrary) return;
  f.addedToLibrary = true;
  state.docs.unshift({id:'d'+Date.now(), name:f.name, dept:f.dept, type:'Document', version:f.version||'v1', status:'active', requiresApproval:f.requiresApproval, updated:new Date().toISOString().slice(0,10)});
}

/* ---------------- init ---------------- */
function doLogin(email){
  const pickedRole = state.loginSelectedRole;
  const found = state.users.find(u=>u.email.toLowerCase()===email.toLowerCase());
  if(pickedRole){
    // explicit "preview as role" choice always wins over the email match
    state.role = pickedRole;
    const roleUser = state.users.find(u=>u.role===pickedRole);
    state.userName = (found && found.role===pickedRole) ? found.name : (roleUser ? roleUser.name : ROLES[pickedRole].label);
  } else if(found){
    state.role = found.role;
    state.userName = found.name;
  } else {
    state.role = 'loan_officer';
    state.userName = 'Guest Reviewer';
  }
  state.authed = true;
  state.view = 'search';
  state.loginError = false;
}

/* ---------------- EVENT DELEGATION ---------------- */
function wireEvents(){
  const app = el();

  app.addEventListener('click', (e)=>{
    const t = e.target.closest('[data-action]');
    if(!t) return;
    const action = t.dataset.action;
    if(action === 'noop') return;

    switch(action){
      case 'login-submit': {
        const email = document.getElementById('login-email').value;
        doLogin(email);
        update();
        break;
      }
      case 'search-submit': {
        const inp = document.getElementById('search-input');
        runSearch(inp ? inp.value : state.lastQuery);
        break;
      }
      case 'select-role': state.loginSelectedRole = t.dataset.role; update(); break;
      case 'nav': state.view = t.dataset.view; state.modal=null; update(); break;
      case 'logout':
        stopTTS(); stopListening();
        Object.assign(state, {authed:false, role:null, userName:'', view:'search', results:null, modal:null, loginSelectedRole:null});
        update();
        break;

      case 'run-example': {
        const q = t.dataset.q;
        const inp = document.getElementById('search-input'); if(inp) inp.value = q;
        runSearch(q);
        break;
      }
      case 'mic-toggle': micToggle(); break;
      case 'mic-cancel': stopListening(); break;
      case 'retry-search': runSearch(state.lastQuery); break;
      case 'contact-compliance': toast('A note was sent to Compliance about this gap.'); break;
      case 'promote-other': {
        const pkg = PACKAGES[t.dataset.id];
        if(pkg) { state.results = {mode:'result', pkg, others: otherMatchesFor(pkg)}; update(); }
        break;
      }
      case 'toggle-confidence': {
        const id = t.dataset.id;
        state.expandedConfidence = state.expandedConfidence === id ? null : id;
        update();
        break;
      }
      case 'view-source': state.modal = {type:'source', id:t.dataset.id}; update(); break;
      case 'toggle-listen': {
        const id = t.dataset.id; const pkg = PACKAGES[id];
        if(state.tts.activeId === id){
          if(state.tts.status==='playing' || state.tts.status==='paused') pauseResumeTTS();
          else startTTS(pkg);
        } else startTTS(pkg);
        break;
      }
      case 'tts-toggle-pause': pauseResumeTTS(); break;
      case 'tts-stop': stopTTS(); break;
      case 'copy-excerpt': {
        const pkg = PACKAGES[t.dataset.id];
        if(pkg) copyExcerpt(pkg);
        break;
      }
      case 'rerun-search': runSearch(state.lastQuery); break;
      case 'feedback': handleFeedback(t.dataset.id, t.dataset.vote); break;
      case 'feedback-reason':
        state.feedbackReasonOpenFor = null;
        showAck(t.dataset.id, 'Noted — ' + t.dataset.reason);
        break;
      case 'feedback-reason-skip':
        state.feedbackReasonOpenFor = null;
        showAck(t.dataset.id, 'Thanks — recorded');
        break;

      case 'open-upload': state.modal = {type:'upload'}; state.uploadFiles = []; update(); break;
      case 'dropzone-click': document.getElementById('file-input').click(); break;
      case 'remove-upload-row': state.uploadFiles.splice(Number(t.dataset.i),1); update(); break;
      case 'confirm-upload': confirmUpload(Number(t.dataset.i)); break;
      case 'approve-file': {
        const f = state.uploadFiles[Number(t.dataset.i)];
        if(f){ f.stage='done'; addFileToLibrary(f); update(); toast('Document approved and now active.'); }
        break;
      }
      case 'meta-approval': {
        const f = state.uploadFiles[Number(t.dataset.i)];
        if(f){ f.requiresApproval = !f.requiresApproval; update(); }
        break;
      }
      case 'open-doc-detail': state.modal = {type:'docDetail', id:t.dataset.id}; update(); break;
      case 'retry-ingestion': {
        const d = state.docs.find(x=>x.id===t.dataset.id);
        if(d){ d.status='processing'; update(); setTimeout(()=>{ d.status='active'; delete d.failReason; update(); toast('Ingestion succeeded — document is now active.'); }, 1800); }
        break;
      }
      case 'reupload-doc': state.modal = {type:'upload'}; state.uploadFiles=[]; toast('Upload the replacement file below.'); update(); break;
      case 'archive-doc': {
        state.docs = state.docs.filter(x=>x.id!==t.dataset.id);
        state.modal = null; update(); toast('Document deactivated and removed from the index.');
        break;
      }
      case 'close-modal': state.modal = null; update(); break;

      case 'resolve-gap': {
        const g = state.gaps.find(x=>x.id===t.dataset.id);
        if(g){ g.resolved = true; update(); toast('Marked as resolved.'); }
        break;
      }
      case 'export-audit': exportAuditCSV(); break;
      case 'toggle-audit-row': state.auditExpandedRow = state.auditExpandedRow===t.dataset.id ? null : t.dataset.id; update(); break;

      case 'add-user': state.modal = {type:'addUser'}; update(); break;
      case 'confirm-add-user': {
        const name = document.getElementById('new-user-name').value.trim() || 'New teammate';
        const email = document.getElementById('new-user-email').value.trim() || 'new.user@ledgerhq.com';
        const role = document.getElementById('new-user-role').value;
        state.users.push({id:'u'+Date.now(), name, email, role, dept:'—'});
        state.modal = null; update(); toast('Invite sent to '+email+'.');
        break;
      }

      case 'toggle-push-to-talk': state.voice.pushToTalk = !state.voice.pushToTalk; update(); break;
      case 'toggle-read-steps': state.tts.readStepsToo = !state.tts.readStepsToo; update(); break;

      case 'toggle-demo': state.demoOpen = !state.demoOpen; update(); break;
      case 'set-demo-force': state.demoForce = t.dataset.k==='auto' ? null : t.dataset.k; update(); break;
      case 'set-voice-demo-force': state.voiceDemoForce = t.dataset.k==='normal' ? null : t.dataset.k; update(); break;
      case 'toggle-analytics-empty': state.analyticsEmpty = !state.analyticsEmpty; update(); break;
      case 'toggle-gaps-empty': state.gapsEmptyDemo = !state.gapsEmptyDemo; update(); break;
      case 'force-session-expiry':
        state.sessionPreservedQuery = state.lastQuery;
        state.modal = {type:'sessionExpired'}; state.demoOpen=false; update();
        break;
      case 'resume-session':
        state.modal = null; update();
        toast('Signed back in — your search was preserved.');
        break;
      case 'analytics-range': break;
    }
  });

  app.addEventListener('change', (e)=>{
    if(e.target && e.target.id === 'file-input'){
      handleFilesSelected(e.target.files);
      e.target.value = '';
      return;
    }
    const t = e.target.closest('[data-action]');
    if(!t) return;
    const action = t.dataset.action;
    if(action === 'gap-filter-sort'){ state.gapFilter.sort = t.value; update(); }
    if(action === 'gap-filter-dept'){ state.gapFilter.dept = t.value; update(); }
    if(action === 'gap-filter-resolved'){ state.gapFilter.showResolved = t.checked; update(); }
    if(action === 'audit-filter-user'){ state.auditFilter.user = t.value; update(); }
    if(action === 'audit-filter-conf'){ state.auditFilter.minConf = Number(t.value); update(); }
    if(action === 'change-user-role'){
      const u = state.users.find(x=>x.id===t.dataset.id);
      if(u){ u.role = t.value; update(); toast('Role updated.'); }
    }
    if(action === 'meta-dept'){ const f = state.uploadFiles[Number(t.dataset.i)]; if(f) f.dept = t.value; }
    if(action === 'meta-version'){ const f = state.uploadFiles[Number(t.dataset.i)]; if(f) f.version = t.value; }
  });

  app.addEventListener('input', (e)=>{
    const t = e.target.closest('[data-action]');
    if(!t) return;
    if(t.dataset.action === 'audit-filter-q'){ state.auditFilter.q = t.value; update(); }
    if(t.dataset.action === 'meta-version'){ const f = state.uploadFiles[Number(t.dataset.i)]; if(f) f.version = t.value; }
  });

  app.addEventListener('dragover', (e)=>{
    if(e.target.closest('#dropzone')){ e.preventDefault(); document.getElementById('dropzone').classList.add('dragover'); }
  });
  app.addEventListener('dragleave', (e)=>{
    if(e.target.closest('#dropzone')){ document.getElementById('dropzone').classList.remove('dragover'); }
  });
  app.addEventListener('drop', (e)=>{
    if(e.target.closest('#dropzone')){
      e.preventDefault();
      document.getElementById('dropzone').classList.remove('dragover');
      if(e.dataTransfer.files && e.dataTransfer.files.length) handleFilesSelected(e.dataTransfer.files);
    }
  });

  // push-to-talk: press-and-hold behaviour when enabled in Settings
  app.addEventListener('mousedown', (e)=>{
    const t = e.target.closest('[data-action="mic-toggle"]');
    if(t && state.voice.pushToTalk && state.voice.status === 'idle') startListening();
  });
  window.addEventListener('mouseup', ()=>{
    if(state.voice.pushToTalk && state.voice.status === 'listening') stopListening();
  });
  app.addEventListener('touchstart', (e)=>{
    const t = e.target.closest('[data-action="mic-toggle"]');
    if(t && state.voice.pushToTalk && state.voice.status === 'idle'){ e.preventDefault(); startListening(); }
  }, {passive:false});
  window.addEventListener('touchend', ()=>{
    if(state.voice.pushToTalk && state.voice.status === 'listening') stopListening();
  });

  window.addEventListener('keydown', (e)=>{
    if(e.key === 'Escape'){
      if(state.modal && state.modal.type !== 'sessionExpired'){ state.modal = null; update(); }
      else if(state.voice.status === 'listening'){ stopListening(); }
      return;
    }
    if(e.key === 'Enter'){
      if(e.target && e.target.id === 'login-email' || e.target && e.target.id === 'login-pass'){
        e.preventDefault();
        doLogin(document.getElementById('login-email').value);
        update();
      } else if(e.target && e.target.id === 'search-input'){
        e.preventDefault();
        runSearch(e.target.value);
      }
    }
  });
}

function exportAuditCSV(){
  const af = state.auditFilter;
  const rows = state.audit.filter(a => (af.user==='all'||a.user===af.user) && a.confidence>=af.minConf && (!af.q || a.query.toLowerCase().includes(af.q.toLowerCase())));
  const header = ['Timestamp','User','Role','Query','Confidence','Tier','Documents Cited','Response ID'];
  const csvRows = [header.join(',')];
  rows.forEach(a=>{
    csvRows.push([a.ts, a.user, ROLES[a.role].label, '"'+a.query.replace(/"/g,'""')+'"', a.confidence, a.tier, '"'+a.docs.join('; ')+'"', a.rid].join(','));
  });
  const blob = new Blob([csvRows.join('\n')], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'ledger-audit-log.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('Audit log exported.');
}

    '<h2 style="color:#d6685e;margin-top:0;">Ledger failed to start</h2>' +
    '<p>Something threw an error before the interface could render. Details below — this is safe to share for debugging:</p>' +
    '<pre style="white-space:pre-wrap;background:#111217;padding:12px;border-radius:8px;font-size:12px;overflow:auto;">' +
    (err && err.stack ? err.stack : String(err)) +
    '</pre></div>';
  console.error('Ledger bootstrap error:', err);
}
